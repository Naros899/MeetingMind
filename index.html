<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chronics.ai — Meeting Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --bg: #0d0c0b;
      --surface: #181614;
      --surface2: #201e1c;
      --surface3: #272422;
      --border: #2d2a27;
      --gold: #c9a84c;
      --gold-light: #e0bb6a;
      --gold-dim: rgba(201,168,76,0.12);
      --text: #ede8e0;
      --text-dim: #7a756d;
      --text-muted: #4a4642;
      --green: #5a8c5e;
      --green-dim: rgba(90,140,94,0.12);
      --red: #a05050;
      --red-dim: rgba(160,80,80,0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 20px 20px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo-gem {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #c9a84c 0%, #a07c30 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 2px 12px rgba(201,168,76,0.25);
      flex-shrink: 0;
    }

    .logo-wordmark { line-height: 1.2; }

    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .logo-tag {
      font-size: 10.5px;
      color: var(--text-dim);
      letter-spacing: 1.4px;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 22px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Card base ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    /* ── Settings ── */
    .keys-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .keys-label {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .keys-badge {
      font-size: 11.5px;
      color: var(--green);
      background: var(--green-dim);
      border-radius: 20px;
      padding: 3px 10px;
      display: none;
    }

    .keys-body { margin-top: 16px; }

    .field { margin-bottom: 11px; }

    .field label {
      display: block;
      font-size: 11.5px;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .field input, .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .field textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    .field input:focus, .field textarea:focus { border-color: var(--gold); }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-muted); }

    .field-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      border: none; cursor: pointer; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      background: var(--gold);
      color: #0d0c0b;
      width: 100%; padding: 13px;
      border-radius: 10px; font-size: 15px;
    }

    .btn-primary:hover:not(:disabled) { background: var(--gold-light); }

    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-send {
      background: var(--green);
      color: #fff;
      width: 100%; padding: 14px;
      border-radius: 10px; font-size: 15px;
    }

    .btn-send:hover:not(:disabled) { background: #6a9c6e; }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      width: 100%; padding: 11px;
      border-radius: 10px; font-size: 14px;
    }

    .btn-outline:hover { background: var(--surface2); color: var(--text); }

    .btn-mini {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px; padding: 4px 10px;
      border-radius: 5px; font-weight: 400;
    }

    .btn-mini:hover { background: var(--border); color: var(--text); }

    /* ── Input mode toggle ── */
    .mode-toggle {
      display: flex; gap: 3px;
      background: var(--surface);
      padding: 4px;
      border-radius: 11px;
      border: 1px solid var(--border);
    }

    .mode-btn {
      flex: 1; padding: 9px 5px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      text-align: center; cursor: pointer;
      white-space: nowrap; color: var(--text-dim);
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-btn.active { background: var(--surface2); color: var(--gold); }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
      font-size: 0;
    }

    .upload-icon {
      font-size: 32px; margin-bottom: 10px;
      display: block;
    }

    .upload-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px; margin-bottom: 5px;
    }

    .upload-hint {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.55;
    }

    /* ── File preview ── */
    .file-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-top: 10px;
    }

    .file-row-icon { font-size: 22px; flex-shrink: 0; }

    .file-row-info { flex: 1; min-width: 0; }

    .file-row-name {
      font-size: 13.5px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .file-row-size { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; }

    .file-row-remove {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; padding: 4px;
    }

    /* ── Progress ── */
    .step-list { display: flex; flex-direction: column; gap: 14px; }

    .step-row {
      display: flex; align-items: center; gap: 12px;
    }

    .step-orb {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-dim);
      flex-shrink: 0; transition: all 0.3s; font-weight: 500;
    }

    .step-orb.active {
      border-color: var(--gold);
      background: var(--gold-dim);
      color: var(--gold);
      animation: orbpulse 1.6s ease-in-out infinite;
    }

    .step-orb.done {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
    }

    @keyframes orbpulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.35); }
      50%       { box-shadow: 0 0 0 7px rgba(201,168,76,0); }
    }

    .step-lbl { font-size: 14px; color: var(--text-dim); transition: color 0.2s; }
    .step-lbl.active { color: var(--text); font-weight: 400; }
    .step-lbl.done   { color: var(--text-dim); }

    .err-box {
      background: var(--red-dim);
      border: 1px solid rgba(160,80,80,0.3);
      border-radius: var(--radius-sm);
      padding: 13px 15px;
      font-size: 13px; color: #d08080;
      line-height: 1.55; margin-top: 14px;
    }

    /* ── Results tabs ── */
    .tabs {
      display: flex; gap: 3px;
      background: var(--surface);
      padding: 4px;
      border-radius: 11px;
      border: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 1; padding: 8px 5px;
      border-radius: 8px; font-size: 12px; font-weight: 500;
      text-align: center; cursor: pointer;
      white-space: nowrap; color: var(--text-dim);
      border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab.active { background: var(--surface2); color: var(--gold); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Result cards ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
    }

    .result-actions {
      position: absolute; top: 14px; right: 14px;
      display: flex; gap: 6px;
    }

    .prose {
      font-size: 14px; line-height: 1.72;
      color: var(--text); white-space: pre-wrap;
      padding-top: 2px;
    }

    /* ── Key points ── */
    .kp-list { display: flex; flex-direction: column; gap: 8px; }

    .kp-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13.5px; line-height: 1.55;
    }

    .kp-bullet {
      width: 6px; height: 6px; flex-shrink: 0;
      background: var(--gold);
      border-radius: 50%;
      margin-top: 8px;
    }

    /* ── Action items ── */
    .steps-list { display: flex; flex-direction: column; gap: 9px; }

    .step-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface2);
      border-radius: 9px; padding: 12px 13px;
    }

    .step-num {
      width: 22px; height: 22px; flex-shrink: 0;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--gold); font-weight: 500;
      margin-top: 1px;
    }

    .step-item-text { font-size: 13.5px; line-height: 1.55; padding-top: 2px; }

    /* ── Email ── */
    .email-meta { margin-bottom: 14px; }

    .email-field-label {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin-bottom: 3px;
    }

    .email-field-val { font-size: 14px; line-height: 1.5; }

    .email-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 22px;
      font-size: 13px; color: var(--text);
      transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
      z-index: 50; pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Utilities ── */
    .hidden { display: none !important; }
    .mt { margin-top: 16px; }

    .section-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.3px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .btn-row {
      display: flex; gap: 10px; margin-top: 16px;
    }

    .btn-row .btn { flex: 1; }

    /* ── Responsive ── */

    @media (min-width: 600px) {
      main { max-width: 680px; padding: 32px 28px 100px; gap: 20px; }
      header { padding: 24px 28px 22px; }
      .logo-gem { width: 44px; height: 44px; font-size: 22px; border-radius: 12px; }
      .logo-name { font-size: 22px; }
      .logo-tag { font-size: 11.5px; }
      .card { padding: 22px; }
      .result-card { padding: 22px; }
      .tab { font-size: 13.5px; padding: 10px 8px; }
      .prose { font-size: 15px; }
      .btn-primary, .btn-send { padding: 15px; font-size: 16px; }
      .btn-outline { padding: 13px; font-size: 15px; }
      .field input, .field textarea { padding: 13px 15px; }
    }

    @media (min-width: 900px) {
      main { max-width: 740px; padding: 40px 32px 100px; }
      header { padding: 24px 40px 22px; }
    }

    @media (max-width: 380px) {
      header { padding: 16px 14px 14px; gap: 10px; }
      .logo-gem { width: 34px; height: 34px; font-size: 17px; }
      .logo-name { font-size: 17px; }
      main { padding: 18px 12px 90px; gap: 14px; }
      .card { padding: 15px; }
      .result-card { padding: 15px; }
      .tab { font-size: 11px; padding: 7px 4px; }
      .btn-primary, .btn-send { padding: 12px; font-size: 14px; }
    }

    @media (pointer: coarse) {
      .btn-mini { padding: 7px 14px; font-size: 12px; }
      .tab { padding: 10px 6px; min-height: 44px; }
      .keys-header { min-height: 44px; }
      .field input, .field textarea { padding: 13px 14px; font-size: 16px; }
    }

    @supports (padding: env(safe-area-inset-bottom)) {
      main { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
      header {
        padding-left: calc(20px + env(safe-area-inset-left));
        padding-right: calc(20px + env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-gem">C</div>
  <div class="logo-wordmark">
    <div class="logo-name">Chronics.ai</div>
    <div class="logo-tag">Meeting Intelligence</div>
  </div>
</header>

<main>

  <!-- ── Settings ── -->
  <div class="card" id="settingsCard">
    <div class="keys-header" onclick="toggleSettings()" role="button" aria-expanded="true">
      <span class="keys-label">Settings</span>
      <span class="keys-badge" id="settingsBadge">Configured</span>
    </div>
    <div class="keys-body" id="settingsBody" style="display:none">
      <div class="field" style="margin-top:14px">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="e.g. John Smith" autocomplete="off">
        <div class="field-hint">Saved for all meetings — used in emails</div>
      </div>
      <hr class="field-divider">
      <div class="field">
        <label>OpenAI API Key</label>
        <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <hr class="field-divider">
      <div class="field">
        <label>EmailJS Service ID</label>
        <input type="text" id="ejsService" placeholder="service_xxxxxxx" autocomplete="off">
      </div>
      <div class="field">
        <label>EmailJS Template ID</label>
        <input type="text" id="ejsTemplate" placeholder="template_xxxxxxx" autocomplete="off">
      </div>
      <div class="field">
        <label>EmailJS Public Key</label>
        <input type="text" id="ejsPublicKey" placeholder="your_public_key" autocomplete="off">
      </div>
      <button class="btn btn-primary" style="margin-top:4px" onclick="saveSettings()">Save Settings</button>
      <div class="field-hint" style="margin-top:10px; text-align:center">
        <a href="setup.html" style="color:var(--gold); text-decoration:none;">Need help? View setup guide</a>
      </div>
    </div>
  </div>

  <!-- ── Input Section ── -->
  <div id="inputSection">

    <!-- Mode toggle -->
    <div class="mode-toggle" style="margin-bottom:16px">
      <button class="mode-btn active" id="modeNotes" onclick="switchMode('notes')">Paste Notes</button>
      <button class="mode-btn" id="modeAudio" onclick="switchMode('audio')">Upload Recording</button>
    </div>

    <!-- Meeting info fields (shared) -->
    <div class="card" id="meetingInfoCard">
      <p class="section-eyebrow" style="margin-bottom:14px">Meeting Info</p>
      <div class="field">
        <label>Who You Met With</label>
        <input type="text" id="contactName" placeholder="e.g. Sarah Johnson">
      </div>
      <div class="field">
        <label>Company / Brand</label>
        <input type="text" id="companyName" placeholder="e.g. Green Leaf Co.">
      </div>
      <div class="field">
        <label>Recipient Email</label>
        <input type="email" id="recipientEmail" placeholder="sarah@greenleaf.com">
      </div>
      <div class="field">
        <label>Meeting Title (optional)</label>
        <input type="text" id="meetingTitle" placeholder="e.g. Product Partnership Discussion">
      </div>
    </div>

    <!-- Notes mode -->
    <div id="notesInput">
      <div class="card">
        <p class="section-eyebrow" style="margin-bottom:14px">Meeting Notes</p>
        <div class="field" style="margin-bottom:0">
          <textarea id="rawNotes" placeholder="Paste your meeting notes, voice transcript, or raw recap here..."></textarea>
        </div>
      </div>
    </div>

    <!-- Audio mode -->
    <div id="audioInput" class="hidden">
      <div class="card">
        <p class="section-eyebrow" style="margin-bottom:14px">Upload Recording</p>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="audio/*,video/*,.mp3,.m4a,.wav,.mp4,.mov,.ogg,.webm" onchange="handleFile(event)">
          <span class="upload-icon">🎤</span>
          <div class="upload-title">Upload Audio / Video</div>
          <div class="upload-hint">MP3 · M4A · WAV · MP4 · MOV · OGG</div>
        </div>
        <div id="filePreview" class="hidden">
          <div class="file-row">
            <span class="file-row-icon">🎵</span>
            <div class="file-row-info">
              <div class="file-row-name" id="fileName">—</div>
              <div class="file-row-size" id="fileSize">—</div>
            </div>
            <button class="file-row-remove" onclick="removeFile()">×</button>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary mt" id="generateBtn" onclick="runPipeline()">
      Generate Summary
    </button>
  </div>

  <!-- ── Progress ── -->
  <div class="card hidden" id="progressCard">
    <p class="section-eyebrow" style="margin-bottom:18px">Processing</p>
    <div class="step-list" id="stepList"></div>
    <div class="hidden err-box" id="errBox"></div>
  </div>

  <!-- ── Results ── -->
  <div id="resultsSection" class="hidden">
    <p class="section-eyebrow">Results</p>

    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="switchTab('summary', 0)">Summary</button>
      <button class="tab" onclick="switchTab('keypoints', 1)">Key Points</button>
      <button class="tab" onclick="switchTab('actions', 2)">Actions</button>
      <button class="tab" onclick="switchTab('email', 3)">Email</button>
    </div>

    <!-- Summary -->
    <div class="panel active" id="panel-summary">
      <div class="result-card">
        <div class="result-actions">
          <button class="btn btn-mini" onclick="copyText('summaryProse')">Copy</button>
        </div>
        <div class="prose" id="summaryProse"></div>
      </div>
    </div>

    <!-- Key Points -->
    <div class="panel" id="panel-keypoints">
      <div class="result-card">
        <div class="result-actions">
          <button class="btn btn-mini" onclick="copyKeyPoints()">Copy</button>
        </div>
        <div class="kp-list" id="keyPointsList"></div>
      </div>
    </div>

    <!-- Action Items -->
    <div class="panel" id="panel-actions">
      <div class="result-card">
        <div class="result-actions">
          <button class="btn btn-mini" onclick="copyActions()">Copy All</button>
        </div>
        <div class="steps-list" id="actionsList"></div>
      </div>
    </div>

    <!-- Email -->
    <div class="panel" id="panel-email">
      <div class="result-card">
        <div class="result-actions">
          <button class="btn btn-mini" onclick="copyEmail()">Copy</button>
        </div>
        <div class="email-meta">
          <div class="email-field-label">To</div>
          <div class="email-field-val" id="emailTo"></div>
        </div>
        <div class="email-meta">
          <div class="email-field-label">Subject</div>
          <div class="email-field-val" id="emailSubject"></div>
        </div>
        <hr class="email-divider">
        <div class="prose" id="emailBody"></div>
      </div>
    </div>

    <!-- Send / New Meeting buttons -->
    <div class="btn-row">
      <button class="btn btn-send" id="sendBtn" onclick="sendEmail()">Send Email</button>
    </div>
    <button class="btn btn-outline mt" onclick="resetApp()">New Meeting</button>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ────────────────────────────────────────────
   State
──────────────────────────────────────────── */
let cfg = JSON.parse(localStorage.getItem('chronics_cfg') || '{}');
let file = null;
let results = {};
let currentMode = 'notes';
const tabNames = ['summary','keypoints','actions','email'];

/* ────────────────────────────────────────────
   Init
──────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // Restore settings
  if (cfg.userName) document.getElementById('userName').value = cfg.userName;
  if (cfg.openai) document.getElementById('openaiKey').value = cfg.openai;
  if (cfg.ejsService) document.getElementById('ejsService').value = cfg.ejsService;
  if (cfg.ejsTemplate) document.getElementById('ejsTemplate').value = cfg.ejsTemplate;
  if (cfg.ejsPublicKey) document.getElementById('ejsPublicKey').value = cfg.ejsPublicKey;

  if (cfg.openai && cfg.userName) {
    document.getElementById('settingsBadge').style.display = 'block';
    document.getElementById('settingsBody').style.display = 'none';
  } else {
    // First visit — expand settings
    document.getElementById('settingsBody').style.display = 'block';
  }

  // Init EmailJS
  if (cfg.ejsPublicKey) {
    emailjs.init(cfg.ejsPublicKey);
  }

  // Drag & drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });
});

/* ────────────────────────────────────────────
   Settings
──────────────────────────────────────────── */
function toggleSettings() {
  const body = document.getElementById('settingsBody');
  body.style.display = (body.style.display === 'none') ? 'block' : 'none';
}

function saveSettings() {
  const userName = document.getElementById('userName').value.trim();
  const openai = document.getElementById('openaiKey').value.trim();
  const ejsService = document.getElementById('ejsService').value.trim();
  const ejsTemplate = document.getElementById('ejsTemplate').value.trim();
  const ejsPublicKey = document.getElementById('ejsPublicKey').value.trim();

  if (!userName) { toast('Please enter your name'); return; }
  if (!openai) { toast('OpenAI API key is required'); return; }

  cfg = { userName, openai, ejsService, ejsTemplate, ejsPublicKey };
  localStorage.setItem('chronics_cfg', JSON.stringify(cfg));

  if (ejsPublicKey) emailjs.init(ejsPublicKey);

  document.getElementById('settingsBadge').style.display = 'block';
  document.getElementById('settingsBody').style.display = 'none';
  toast('Settings saved');
}

/* ────────────────────────────────────────────
   Mode toggle
──────────────────────────────────────────── */
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeNotes').classList.toggle('active', mode === 'notes');
  document.getElementById('modeAudio').classList.toggle('active', mode === 'audio');
  document.getElementById('notesInput').classList.toggle('hidden', mode !== 'notes');
  document.getElementById('audioInput').classList.toggle('hidden', mode !== 'audio');
}

/* ────────────────────────────────────────────
   File handling
──────────────────────────────────────────── */
function handleFile(e) {
  const f = e.target.files[0];
  if (f) setFile(f);
}

function setFile(f) {
  file = f;
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileSize').textContent = fmtSize(f.size);
  document.getElementById('filePreview').classList.remove('hidden');
}

function removeFile() {
  file = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').classList.add('hidden');
}

function fmtSize(b) {
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

/* ────────────────────────────────────────────
   Pipeline
──────────────────────────────────────────── */
async function runPipeline() {
  // Validate
  if (!cfg.openai) { toast('Please configure your OpenAI key in Settings'); return; }

  const userName = cfg.userName || '';
  const contactName = document.getElementById('contactName').value.trim();
  const companyName = document.getElementById('companyName').value.trim();
  const recipientEmail = document.getElementById('recipientEmail').value.trim();
  const meetingTitle = document.getElementById('meetingTitle').value.trim();

  if (!contactName || !recipientEmail) {
    toast('Please fill in contact name and email');
    return;
  }

  let notesText = '';

  if (currentMode === 'notes') {
    notesText = document.getElementById('rawNotes').value.trim();
    if (!notesText) { toast('Please enter your meeting notes'); return; }
  } else {
    if (!file) { toast('Please upload a recording'); return; }
  }

  // Store meeting info for email
  results.userName = userName;
  results.contactName = contactName;
  results.companyName = companyName;
  results.recipientEmail = recipientEmail;
  results.meetingTitle = meetingTitle;

  // Show progress
  document.getElementById('inputSection').classList.add('hidden');
  const pc = document.getElementById('progressCard');
  pc.classList.remove('hidden');
  document.getElementById('errBox').classList.add('hidden');

  // Build steps based on mode
  const steps = [];
  if (currentMode === 'audio') {
    steps.push('Transcribing with Whisper');
  }
  steps.push('Analyzing notes');
  steps.push('Generating summary & action items');
  steps.push('Drafting follow-up email');

  renderSteps(steps);

  let stepIdx = 0;

  try {
    // Transcribe if audio mode
    if (currentMode === 'audio') {
      orbStep(stepIdx, 'active');
      notesText = await transcribe(file);
      orbStep(stepIdx, 'done');
      stepIdx++;
    }

    // Analyze
    orbStep(stepIdx, 'active');
    const analysis = await analyze(notesText, { userName, contactName, companyName, meetingTitle });
    orbStep(stepIdx, 'done');
    stepIdx++;

    // Summary & actions (instant from analysis)
    orbStep(stepIdx, 'active');
    results.summary = analysis.summary;
    results.keyPoints = analysis.key_points;
    results.actionItems = analysis.action_items;
    await sleep(300);
    orbStep(stepIdx, 'done');
    stepIdx++;

    // Email
    orbStep(stepIdx, 'active');
    results.emailSubject = analysis.email_subject;
    results.emailBody = analysis.email_body;
    await sleep(300);
    orbStep(stepIdx, 'done');

    await sleep(500);
    pc.classList.add('hidden');
    renderResults();

  } catch (err) {
    const box = document.getElementById('errBox');
    box.classList.remove('hidden');
    box.textContent = err.message || 'Something went wrong. Check your settings and try again.';
    // Reset active orbs
    document.querySelectorAll('.step-orb.active').forEach(o => {
      o.className = 'step-orb';
    });
    // Show retry button
    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn btn-outline';
    retryBtn.style.marginTop = '14px';
    retryBtn.textContent = 'Go Back';
    retryBtn.onclick = () => {
      document.getElementById('progressCard').classList.add('hidden');
      document.getElementById('inputSection').classList.remove('hidden');
    };
    if (!box.nextElementSibling?.classList?.contains('btn-outline')) {
      box.after(retryBtn);
    }
  }
}

function renderSteps(steps) {
  const list = document.getElementById('stepList');
  list.innerHTML = '';
  steps.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `<div class="step-orb" id="orb${i}">${i + 1}</div><span class="step-lbl" id="lbl${i}">${esc(s)}</span>`;
    list.appendChild(row);
  });
}

function orbStep(idx, state) {
  const el = document.getElementById('orb' + idx);
  const lbl = document.getElementById('lbl' + idx);
  if (!el) return;
  el.className = 'step-orb ' + state;
  if (state === 'done') el.innerHTML = '&#10003;';
  if (lbl) lbl.className = 'step-lbl ' + state;
}

/* ────────────────────────────────────────────
   Transcribe (audio mode)
──────────────────────────────────────────── */
async function transcribe(f) {
  const fd = new FormData();
  fd.append('file', f);
  fd.append('model', 'whisper-1');
  fd.append('response_format', 'text');

  const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + cfg.openai },
    body: fd
  });

  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.error?.message || msg; } catch(_) {}
    throw new Error('Transcription failed: ' + msg);
  }
  return res.text();
}

/* ────────────────────────────────────────────
   Analyze with OpenAI GPT
──────────────────────────────────────────── */
async function analyze(notes, info) {
  const prompt = `You are a professional meeting analyst for a B2B cannabis industry event called Interchange.

Analyze the following meeting notes and provide a structured JSON response.

MEETING CONTEXT:
- From: ${info.userName}
- Met with: ${info.contactName}
- Company: ${info.companyName}
${info.meetingTitle ? '- Meeting: ' + info.meetingTitle : ''}

RAW NOTES:
${notes.slice(0, 14000)}

Return ONLY a valid JSON object with this exact structure:
{
  "summary": "3-5 sentence professional summary of the meeting",
  "key_points": ["Key point 1", "Key point 2", ...],
  "action_items": ["Action item 1 with owner", "Action item 2 with owner", ...],
  "email_subject": "Follow-up: [topic]",
  "email_body": "Professional follow-up email body (under 250 words). Address it to ${info.contactName}. Sign off as ${info.userName}."
}

Guidelines:
- Clean up any rough notes, typos, or voice-to-text artifacts
- Summary: clear, professional, factual
- Key points: the most important takeaways (3-6 items)
- Action items: specific, actionable, with responsible person noted
- Email: warm, professional, concise — suitable for a B2B follow-up`;

  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + cfg.openai
    },
    body: JSON.stringify({
      model: 'gpt-4o',
      max_completion_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    let msg = res.statusText;
    try { const j = await res.json(); msg = j.error?.message || msg; } catch(_) {}
    throw new Error('Analysis failed: ' + msg);
  }

  const data = await res.json();
  const text = data.choices[0]?.message?.content || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse response. Please try again.');
  try { return JSON.parse(match[0]); }
  catch(_) { throw new Error('Invalid response format. Please try again.'); }
}

/* ────────────────────────────────────────────
   Render results
──────────────────────────────────────────── */
function renderResults() {
  // Summary
  document.getElementById('summaryProse').textContent = results.summary;

  // Key points
  const kpList = document.getElementById('keyPointsList');
  kpList.innerHTML = '';
  (results.keyPoints || []).forEach(kp => {
    const div = document.createElement('div');
    div.className = 'kp-item';
    div.innerHTML = `<span class="kp-bullet"></span><span>${esc(kp)}</span>`;
    kpList.appendChild(div);
  });

  // Action items
  const actionsList = document.getElementById('actionsList');
  actionsList.innerHTML = '';
  (results.actionItems || []).forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.innerHTML = `<span class="step-num">${i + 1}</span><span class="step-item-text">${esc(s)}</span>`;
    actionsList.appendChild(div);
  });

  // Email
  document.getElementById('emailTo').textContent = results.recipientEmail;
  document.getElementById('emailSubject').textContent = results.emailSubject || '';
  document.getElementById('emailBody').textContent = results.emailBody || '';

  // Show send button only if EmailJS configured
  document.getElementById('sendBtn').disabled = !(cfg.ejsService && cfg.ejsTemplate && cfg.ejsPublicKey);

  document.getElementById('resultsSection').classList.remove('hidden');
  switchTab('summary', 0);
}

/* ────────────────────────────────────────────
   Send email via EmailJS
──────────────────────────────────────────── */
async function sendEmail() {
  if (!cfg.ejsService || !cfg.ejsTemplate || !cfg.ejsPublicKey) {
    toast('EmailJS not configured — check Settings');
    return;
  }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await emailjs.send(cfg.ejsService, cfg.ejsTemplate, {
      to_email: results.recipientEmail,
      from_name: results.userName,
      subject: results.emailSubject,
      body: results.emailBody
    });
    toast('Email sent!');
    btn.textContent = 'Sent!';
  } catch (err) {
    toast('Failed to send: ' + (err.text || err.message || 'Unknown error'));
    btn.disabled = false;
    btn.textContent = 'Send Email';
  }
}

/* ────────────────────────────────────────────
   Tabs
──────────────────────────────────────────── */
function switchTab(name, idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  tabNames.forEach(n => {
    const p = document.getElementById('panel-' + n);
    if (p) p.classList.toggle('active', n === name);
  });
}

/* ────────────────────────────────────────────
   Copy helpers
──────────────────────────────────────────── */
function copyText(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => toast('Copied!')).catch(() => fallbackCopy(el.textContent));
}

function copyKeyPoints() {
  const text = (results.keyPoints || []).map(kp => '• ' + kp).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
}

function copyActions() {
  const text = (results.actionItems || []).map((s, i) => `${i + 1}. ${s}`).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
}

function copyEmail() {
  const text = `Subject: ${results.emailSubject}\n\n${results.emailBody}`;
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => fallbackCopy(text));
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  toast('Copied!');
}

/* ────────────────────────────────────────────
   Reset
──────────────────────────────────────────── */
function resetApp() {
  file = null; results = {};
  document.getElementById('rawNotes').value = '';
  document.getElementById('contactName').value = '';
  document.getElementById('companyName').value = '';
  document.getElementById('recipientEmail').value = '';
  document.getElementById('meetingTitle').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').classList.add('hidden');
  document.getElementById('resultsSection').classList.add('hidden');
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('inputSection').classList.remove('hidden');
  document.getElementById('sendBtn').textContent = 'Send Email';
  document.getElementById('sendBtn').disabled = false;
}

/* ────────────────────────────────────────────
   Utilities
──────────────────────────────────────────── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
